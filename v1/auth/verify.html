<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Protect your account · PAVE</title>
  <meta name="theme-color" content="#FBFAF6">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<!-- First-login MFA setup — step-by-step guided for non-technical users
     (FSD 7.1). A) choose channel  B) enter code  C) confirmation. -->
<body>
  <div class="app">
    <header class="topbar">
      <a class="iconbtn" href="login.html" aria-label="Back" id="topBack">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5 8 12l7 7"/></svg>
      </a>
      <span class="topbar__title">Protect your account</span>
    </header>

    <main class="content">
      <div class="authwrap">

        <!-- ===== Step A — choose second factor ===== -->
        <section data-mstep="a">
          <span class="calmcheck pop rise rise-1" style="margin:0 auto;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3Z"/><path d="M9 12l2 2 4-4"/></svg>
          </span>
          <div class="rise rise-1">
            <h1 class="t-h1">Set up a sign-in code</h1>
            <p class="tagline" style="margin-top:var(--sp-2);">A one-time code keeps your health information private. Where should we send it?</p>
          </div>
          <div class="rise rise-2" style="margin-top:var(--sp-4);">
            <button type="button" class="optcard" data-channel="sms" data-to="to your phone ending 4567">
              <span class="optcard__ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="3" width="12" height="18" rx="2.5"/><path d="M10.5 18h3"/></svg></span>
              <span class="optcard__t"><strong>Text message</strong><span>to your phone ···· 4567</span></span>
              <span class="optcard__chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg></span>
            </button>
            <button type="button" class="optcard" data-channel="email" data-to="to john.carter@email.com">
              <span class="optcard__ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M4 7l8 6 8-6"/></svg></span>
              <span class="optcard__t"><strong>Email</strong><span>to john.carter@email.com</span></span>
              <span class="optcard__chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg></span>
            </button>
          </div>
        </section>

        <!-- ===== Step B — enter code ===== -->
        <section data-mstep="b" hidden>
          <span class="calmcheck rise rise-1" style="margin:0 auto;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
          </span>
          <div class="rise rise-1">
            <h1 class="t-h1">Enter your code</h1>
            <p class="tagline" style="margin-top:var(--sp-2);">We sent a 6-digit code <span id="chanTo">to your phone</span>.</p>
          </div>
          <div class="otp rise rise-2" data-otp aria-label="6-digit code" style="margin-top:var(--sp-4);">
            <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 1" autocomplete="one-time-code">
            <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 2">
            <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 3">
            <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 4">
            <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 5">
            <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 6">
          </div>
          <button type="button" class="btn btn--primary rise rise-3" data-goto="c" style="margin-top:var(--sp-4);">Verify</button>
          <div class="rise rise-3" style="display:flex; flex-direction:column; gap:var(--sp-3); margin-top:var(--sp-3);">
            <button type="button" class="btn btn--ghost">Resend code</button>
            <button type="button" class="t-caption" data-back-a style="color:var(--c-primary); font-weight:var(--fw-bold); background:none; min-height:var(--tap-min);">Use a different method</button>
          </div>
        </section>

        <!-- ===== Step C — confirmation ===== -->
        <section data-mstep="c" hidden>
          <span class="calmcheck pop rise rise-1" style="margin:0 auto; background:var(--c-primary); color:#fff;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5 9.5 17.5 19.5 6.5"/></svg>
          </span>
          <div class="rise rise-1">
            <h1 class="t-h1">You're all set</h1>
            <p class="tagline" style="margin-top:var(--sp-2);">Your account is protected. We'll ask for a code only when you sign in on a new device.</p>
          </div>
          <a class="btn btn--primary rise rise-2" href="onboarding.html" style="margin-top:var(--sp-4);">Continue</a>
        </section>

      </div>
    </main>
  </div>
  <script src="../js/app.js"></script>
  <script>
    (function () {
      var steps = {};
      document.querySelectorAll("[data-mstep]").forEach(function (s) { steps[s.getAttribute("data-mstep")] = s; });
      var back = document.getElementById("topBack");
      function show(k) {
        Object.keys(steps).forEach(function (n) { steps[n].hidden = n !== k; });
        back.href = k === "a" ? "login.html" : "#";
        window.scrollTo(0, 0);
      }
      /* A: pick channel -> B */
      steps.a.querySelectorAll(".optcard").forEach(function (c) {
        c.addEventListener("click", function () {
          document.getElementById("chanTo").textContent = c.getAttribute("data-to");
          show("b");
        });
      });
      /* B: verify -> C; different method -> A */
      steps.b.querySelector("[data-goto='c']").addEventListener("click", function () { show("c"); });
      steps.b.querySelector("[data-back-a]").addEventListener("click", function () { show("a"); });
      /* top back button honors the current step */
      back.addEventListener("click", function (e) {
        if (!steps.b.hidden) { e.preventDefault(); show("a"); }
      });
    })();
  </script>
</body>
</html>
