<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checked in · PAVE</title>
  <meta name="theme-color" content="#EDF3EE">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<!-- Full-screen celebration overlay (above the tab bar). Sound OFF by default.
     A normal daily check-in gets the CALM confirmation; real celebration is
     reserved for milestones (7/14/30/60/90 + pain improvement) so it feels
     earned. Deep-link ?milestone=14 (or the preview button) shows the full show. -->
<body>
  <div class="app">

    <!-- ============ Calm daily confirmation (default) ============ -->
    <section class="celebrate" id="calmView" aria-label="Checked in">
      <span class="calmcheck pop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5 9.5 17.5 19.5 6.5"/></svg>
      </span>

      <div>
        <h1 class="t-h1">Checked in for today</h1>
        <p class="t-body-lg t-muted">Your doctor can see your update.</p>
      </div>

      <div class="plantscene">
        <img class="celebrate__smallplant" src="../assets/art/plant-2-seedling.svg" alt="Your plant" width="96" height="96">
      </div>

      <span class="tickpoints">
        <span class="tickpoints__plus">+</span>
        <span class="tickpoints__num">10</span>
        <span class="t-caption" style="align-self:center;">progress points</span>
      </span>

      <p class="t-body t-muted">Come back tomorrow — next reminder at <strong>9:00 AM</strong>.</p>

      <a class="btn btn--primary" href="today.html" style="max-width:320px;">Done</a>

      <!-- Prototype helper: preview the milestone celebration -->
      <button type="button" class="btn btn--ghost" id="previewMilestone" style="max-width:320px; min-height:var(--tap-min);">Preview a milestone celebration</button>
    </section>

    <!-- ============ Milestone celebration (the full show) ============ -->
    <section class="celebrate" id="milestoneView" aria-label="Milestone reached" hidden>
      <!-- soft bloom of petals drifting up (generated by JS) -->
      <div class="bloom" id="bloom" aria-hidden="true"></div>

      <!-- plant grows one stage: seedling -> young plant -->
      <div class="grow" id="grow">
        <img class="grow__img grow__img--from" src="../assets/art/plant-2-seedling.svg" alt="" aria-hidden="true" width="168" height="168">
        <img class="grow__img grow__img--to" src="../assets/art/plant-3-young.svg" alt="Your plant has grown into a young plant" width="168" height="168">
      </div>

      <!-- medallion reveal with a gentle glow -->
      <span class="medalreveal" id="medal">
        <img src="../assets/art/badge-earned.svg" alt="Two Weeks Strong medallion" width="128" height="128">
      </span>

      <div>
        <p class="milestone-name">Two Weeks Strong</p>
        <h1 class="t-h1" style="margin-top:var(--sp-1);">Your plant is growing 🌿</h1>
        <p class="t-body-lg t-muted" style="margin-top:var(--sp-2);">Fourteen days of care. Your doctor can see your update.</p>
      </div>

      <span class="tickpoints">
        <span class="tickpoints__plus">+</span>
        <span class="tickpoints__num" data-count-to="25">0</span>
        <span class="t-caption" style="align-self:center;">progress points</span>
      </span>

      <a class="btn btn--primary" href="today.html" style="max-width:320px;">Done</a>
    </section>

  </div>

  <script src="../js/app.js"></script>
  <script>
    (function () {
      var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      var calmView = document.getElementById("calmView");
      var milestoneView = document.getElementById("milestoneView");

      /* Soft chime — intentionally OFF by default (Section: sound off).
         Kept here as the optional hook; not invoked. */
      function softChime() {
        try {
          var Ctx = window.AudioContext || window.webkitAudioContext;
          if (!Ctx) return;
          var ctx = new Ctx(), o = ctx.createOscillator(), g = ctx.createGain();
          o.type = "sine"; o.frequency.value = 528;
          o.connect(g); g.connect(ctx.destination);
          g.gain.setValueAtTime(0.0001, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.04, ctx.currentTime + 0.06);
          g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.9);
          o.start(); o.stop(ctx.currentTime + 0.95);
        } catch (e) {}
      }

      function countUp(el) {
        if (!el) return;
        var target = parseInt(el.getAttribute("data-count-to"), 10);
        if (reduce) { el.textContent = target; return; }
        var dur = 1000, start = null;
        var ease = function (t) { return 1 - Math.pow(1 - t, 3); };
        (function step(ts) {
          if (start === null) start = ts;
          var p = Math.min((ts - start) / dur, 1);
          el.textContent = Math.round(ease(p) * target);
          if (p < 1) requestAnimationFrame(step);
        })(performance.now());
      }

      function dropPetals() {
        if (reduce) return;
        var layer = document.getElementById("bloom");
        var colors = ["var(--c-accent)", "var(--c-celebrate)", "#43B18E", "#F0A98C"];
        for (var i = 0; i < 16; i++) {
          var p = document.createElement("i");
          p.className = "petal";
          p.style.left = (4 + Math.round((i / 16) * 92) + (i % 3) * 3) + "%";
          p.style.background = colors[i % colors.length];
          p.style.setProperty("--spin", (90 + (i % 5) * 40) + "deg");
          p.style.animationDelay = ((i % 6) * 0.22).toFixed(2) + "s";
          var s = 12 + (i % 4) * 4;
          p.style.width = s + "px"; p.style.height = s + "px";
          layer.appendChild(p);
        }
      }

      /* Run the full milestone show: petals + plant grows + points tick. */
      function runMilestone() {
        dropPetals();
        var grow = document.getElementById("grow");
        if (reduce) { grow.classList.add("is-grown"); }
        else { setTimeout(function () { grow.classList.add("is-grown"); }, 620); }
        countUp(milestoneView.querySelector("[data-count-to]"));
        /* softChime();  // stays OFF by default */
      }

      function showMilestone() {
        calmView.hidden = true;
        milestoneView.hidden = false;
        window.scrollTo(0, 0);
        runMilestone();
      }

      /* Deep-link: ?milestone=... shows the full show straight away. */
      if (/[?&]milestone=/.test(window.location.search)) {
        showMilestone();
      }
      document.getElementById("previewMilestone").addEventListener("click", showMilestone);
    })();
  </script>
</body>
</html>
