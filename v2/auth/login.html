<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welcome · PAVE</title>
  <meta name="theme-color" content="#FBFAF6">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    /* Brand flame mark — a soft warm glow with a gentle sway. */
    .brandflame { position: relative; display: flex; align-items: center; justify-content: center; width: 150px; height: 150px; margin: 0 auto; }
    .brandflame::before { content: ""; position: absolute; width: 128px; height: 128px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,138,61,.26), rgba(255,138,61,0) 68%); }
    .brandflame__img { position: relative; width: 104px; height: 104px; transform-origin: 50% 92%;
      animation: flame-sway 3.2s ease-in-out infinite; }
    @keyframes flame-sway { 0%, 100% { transform: rotate(-3deg) translateY(0); } 50% { transform: rotate(3deg) translateY(-4px); } }
    @media (prefers-reduced-motion: reduce) { .brandflame__img { animation: none; } }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="iconbtn" href="splash.html" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5 8 12l7 7"/></svg>
      </a>
    </header>

    <main class="content">
      <div class="authwrap">

        <!-- Default: request a link. The streak flame welcomes the patient in —
             signing in is the first small step of recovery. -->
        <div id="requestView" style="display:flex; flex-direction:column; gap:var(--sp-5);">

          <div class="brandflame rise rise-1" aria-hidden="true">
            <img class="brandflame__img" src="../assets/art/flame.svg" alt="" width="104" height="104">
          </div>

          <div class="rise rise-1">
            <h1 class="t-display">Welcome to PAVE</h1>
            <p class="tagline" style="margin-top:var(--sp-2);">Your recovery, one small step each day. Enter your email or phone and we'll send a link to sign in.</p>
          </div>

          <div class="rise rise-2" style="display:flex; flex-direction:column; gap:var(--sp-4);">
            <input class="bigfield" type="text" inputmode="email" placeholder="Email or phone number" aria-label="Email or phone number">
            <button type="button" class="btn btn--primary" id="sendBtn">Send my link</button>
          </div>

          <p class="rise rise-3" style="margin:0;">
            <span class="reassure">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
              No password to remember, ever.
            </span>
          </p>
        </div>

        <!-- Sent confirmation. A paper-plane "sent" mark — honest about what
             happened (link sent), not a success check (nothing's done yet). -->
        <div id="sentView" style="display:flex; flex-direction:column; gap:var(--sp-5);" hidden>
          <span class="calmcheck pop" style="margin:0 auto;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4 3 11l6 2.6L21 4Z"/><path d="M21 4 12 21l-2.4-7.4L21 4Z"/></svg>
          </span>
          <div>
            <h1 class="t-h1">Check your phone</h1>
            <p class="tagline" style="margin-top:var(--sp-2);">We sent a sign-in link to you. Tap it to continue.</p>
          </div>
          <div style="display:flex; flex-direction:column; gap:var(--sp-3);">
            <a class="btn btn--primary" href="verify.html">I got the link</a>
            <button type="button" class="btn btn--ghost" id="resendBtn">Resend the link</button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="../js/app.js"></script>
  <script>
    (function () {
      var req = document.getElementById("requestView");
      var sent = document.getElementById("sentView");
      document.getElementById("sendBtn").addEventListener("click", function () {
        req.hidden = true; sent.hidden = false; window.scrollTo(0, 0);
      });
      document.getElementById("resendBtn").addEventListener("click", function () {
        /* prototype: just re-confirm */
        sent.querySelector(".tagline").textContent = "Sent again — check your phone or email.";
      });
    })();
  </script>
</body>
</html>
