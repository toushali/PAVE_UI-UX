<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PAVE — Settings</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
</head>
<body>
<div class="app"><div class="content scroll">
  <div class="topbar rise rise-1"><span class="topbar__title">Settings</span></div>

  <section class="card rise rise-2">
    <div class="card__title">Daily reminder</div>
    <input class="timepick" type="time" value="09:00" aria-label="Daily reminder time">
  </section>

  <section class="card rise rise-2">
    <div class="setrow">
      <span class="setrow__label">How to remind me
        <span class="setrow__sub">Where your daily nudge is sent.</span>
      </span>
      <div class="segmented" data-segmented role="group" aria-label="Reminder channel">
        <button type="button" class="seg is-active" data-seg aria-pressed="true">Text</button>
        <button type="button" class="seg" data-seg aria-pressed="false">Email</button>
      </div>
    </div>
    <div class="setrow">
      <span class="setrow__label">Streak reminders
        <span class="setrow__sub">A gentle nudge if you haven't checked in.</span>
      </span>
      <button type="button" class="switch" data-switch role="switch" aria-checked="true" aria-label="Streak reminders"></button>
    </div>
  </section>

  <section class="card rise rise-3">
    <div class="setrow setrow--stack">
      <span class="setrow__label">Text size
        <span class="setrow__sub">Choose what's comfortable to read.</span>
      </span>
      <div class="sizeseg" data-textsize role="group" aria-label="Text size">
        <button type="button" class="sizeseg__opt" data-size="sm" aria-pressed="false">Small</button>
        <button type="button" class="sizeseg__opt is-active" data-size="md" aria-pressed="true">Default</button>
        <button type="button" class="sizeseg__opt" data-size="lg" aria-pressed="false">Large</button>
      </div>
    </div>
    <div class="setrow">
      <span class="setrow__label">High contrast
        <span class="setrow__sub">Stronger colors and borders.</span>
      </span>
      <button type="button" class="switch" data-contrast-toggle role="switch" aria-checked="false" aria-label="High contrast"></button>
    </div>
  </section>

  <p class="t-caption rise rise-4" style="text-align:center">Need help? <a href="help.html" style="color:var(--c-primary-dark);font-weight:800">Call the office</a></p>
</div>

</div>
<script src="../js/app.js"></script>
</body>
</html>
