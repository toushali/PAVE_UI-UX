<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enter your code · PAVE</title>
  <meta name="theme-color" content="#FBFAF6">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="iconbtn" href="login.html" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5 8 12l7 7"/></svg>
      </a>
    </header>

    <main class="content">
      <div class="authwrap">

        <span class="calmcheck pop rise rise-1" style="margin:0 auto;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3Z"/><path d="M9 12l2 2 4-4"/></svg>
        </span>

        <div class="rise rise-1">
          <h1 class="t-h1">Enter your code</h1>
          <p class="tagline" style="margin-top:var(--sp-2);">We sent a 6-digit code to your phone.</p>
        </div>

        <!-- 6 single-digit boxes, auto-advance -->
        <div class="otp rise rise-2" data-otp aria-label="6-digit code">
          <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 1" autocomplete="one-time-code">
          <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 2">
          <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 3">
          <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 4">
          <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 5">
          <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 6">
        </div>

        <a class="btn btn--primary rise rise-3" href="onboarding.html">Verify</a>

        <div class="rise rise-3" style="display:flex; flex-direction:column; gap:var(--sp-3);">
          <button type="button" class="btn btn--ghost">Resend code</button>
          <button type="button" class="t-caption" data-toggle="whyBox" aria-expanded="false" aria-controls="whyBox" style="color:var(--c-primary); font-weight:var(--fw-bold); background:none; min-height:var(--tap-min);">Why am I doing this?</button>
          <p class="collapse t-caption" id="whyBox" style="text-align:center;">This one-time code keeps your health information private and makes sure it's really you.</p>
        </div>

      </div>
    </main>
  </div>
  <script src="../js/app.js"></script>
</body>
</html>
