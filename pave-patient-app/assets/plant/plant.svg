<!--
  PAVE plant / streak motif — 5 additive growth stages.
  Reused on Today, Confirmation, Rewards.

  Usage: inline this SVG, wrap in an element with class "plant"
  and set data-stage="1".."5". CSS (.plant [data-grow]) reveals
  layers up to the current stage:
    1 sprout  2 leaves  3 small plant  4 fuller  5 flowering
  Map streak length -> stage in the page (e.g. 12 days -> 4).
-->
<svg class="plant__svg" viewBox="0 0 88 96" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- pot -->
  <path d="M22 74h44l-5 18a4 4 0 0 1-4 3H31a4 4 0 0 1-4-3l-5-18Z" fill="#C77700" opacity="0.85"/>
  <rect x="19" y="68" width="50" height="9" rx="4" fill="#C77700"/>
  <!-- stem (always visible from stage 1) -->
  <path data-grow="1" d="M44 68V40" stroke="#147D64" stroke-width="4" stroke-linecap="round"/>
  <!-- 1: sprout tip -->
  <path data-grow="1" d="M44 44c0-6 4-10 9-11-1 6-4 10-9 11Z" fill="#4FA88B"/>
  <!-- 2: first left leaf -->
  <path data-grow="2" d="M44 54c0-6-4-10-10-11 1 6 5 10 10 11Z" fill="#4FA88B"/>
  <!-- 3: upper right leaf -->
  <path data-grow="3" d="M44 34c0-7 5-12 12-13-1 7-5 12-12 13Z" fill="#147D64"/>
  <!-- 4: upper left leaf -->
  <path data-grow="4" d="M44 30c0-7-6-12-13-13 1 7 6 12 13 13Z" fill="#147D64"/>
  <!-- 5: flower -->
  <g data-grow="5">
    <circle cx="44" cy="20" r="6" fill="#F2B705"/>
    <circle cx="44" cy="11" r="4" fill="#F7CB47"/>
    <circle cx="52" cy="18" r="4" fill="#F7CB47"/>
    <circle cx="36" cy="18" r="4" fill="#F7CB47"/>
    <circle cx="44" cy="20" r="3" fill="#C77700"/>
  </g>
</svg>
