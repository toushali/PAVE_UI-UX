<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checked in · PAVE</title>
  <meta name="theme-color" content="#FBFAF6">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<!-- Full-screen celebration overlay (Section 6.7). Sound OFF by default. -->
<body>
  <div class="app">

    <!-- confetti layer (generated by JS; hidden under reduced-motion) -->
    <div class="confetti" id="confetti" aria-hidden="true"></div>

    <section class="celebrate" aria-label="Check-in confirmed">

      <!-- Big check -->
      <span class="celebrate__check pop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5 9.5 17.5 19.5 6.5"/></svg>
      </span>

      <div>
        <h1 class="t-h1">Nice work, John!</h1>
        <p class="t-body-lg t-muted">Your doctor can see your update.</p>
      </div>

      <!-- Plant grows a leaf: starts at stage 4, JS advances to 5 on mount -->
      <div class="plant" id="plant" data-stage="4">
        <svg viewBox="0 0 88 96" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M22 74h44l-5 18a4 4 0 0 1-4 3H31a4 4 0 0 1-4-3l-5-18Z" fill="#C77700" opacity="0.85"/>
          <rect x="19" y="68" width="50" height="9" rx="4" fill="#C77700"/>
          <path data-grow="1" d="M44 68V40" stroke="#147D64" stroke-width="4" stroke-linecap="round"/>
          <path data-grow="1" d="M44 44c0-6 4-10 9-11-1 6-4 10-9 11Z" fill="#4FA88B"/>
          <path data-grow="2" d="M44 54c0-6-4-10-10-11 1 6 5 10 10 11Z" fill="#4FA88B"/>
          <path data-grow="3" d="M44 34c0-7 5-12 12-13-1 7-5 12-12 13Z" fill="#147D64"/>
          <path data-grow="4" d="M44 30c0-7-6-12-13-13 1 7 6 12 13 13Z" fill="#147D64"/>
          <g data-grow="5">
            <circle cx="44" cy="20" r="6" fill="#F2B705"/>
            <circle cx="44" cy="11" r="4" fill="#F7CB47"/>
            <circle cx="52" cy="18" r="4" fill="#F7CB47"/>
            <circle cx="36" cy="18" r="4" fill="#F7CB47"/>
            <circle cx="44" cy="20" r="3" fill="#C77700"/>
          </g>
        </svg>
      </div>

      <!-- Points tick up -->
      <span class="points">
        <span class="points__plus">+</span>
        <span class="points__num" id="pointsNum">0</span>
        <span class="t-caption" style="align-self:center;">progress points</span>
      </span>

      <!-- Badge / milestone reveal (fired this check-in) -->
      <div class="badge badge--reveal pop" style="animation-delay:220ms;">
        <span class="badge__medal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="5.5"/><path d="M9 13.5 7.5 21l4.5-2.5L16.5 21 15 13.5"/></svg>
        </span>
        <span>
          <span class="badge__name" style="display:block;">New badge: Consistency</span>
          <span class="badge__meta">13-day streak — keep it growing</span>
        </span>
      </div>

      <p class="t-body t-muted">Come back tomorrow — next reminder at <strong>9:00 AM</strong>.</p>

      <a class="btn btn--primary" href="today.html" style="max-width:320px;">Done</a>

    </section>

  </div>

  <script src="../js/app.js"></script>
  <script>
    (function () {
      var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      /* 1) Plant grows its final leaf/flower shortly after mount. */
      var plant = document.getElementById("plant");
      if (reduce) {
        plant.setAttribute("data-stage", "5");
      } else {
        setTimeout(function () { plant.setAttribute("data-stage", "5"); }, 450);
      }

      /* 2) Points tick up 0 -> 10. */
      var target = 10, numEl = document.getElementById("pointsNum");
      if (reduce) {
        numEl.textContent = target;
      } else {
        var n = 0;
        var timer = setInterval(function () {
          n += 1;
          numEl.textContent = n;
          if (n >= target) clearInterval(timer);
        }, 80);
      }

      /* 3) Gentle confetti (celebrate palette). Skipped if reduced-motion. */
      if (!reduce) {
        var layer = document.getElementById("confetti");
        var colors = ["#F2B705", "#147D64", "#4FA88B", "#F7CB47"];
        for (var i = 0; i < 18; i++) {
          var p = document.createElement("i");
          p.style.left = Math.round(Math.random() * 100) + "%";
          p.style.background = colors[i % colors.length];
          p.style.animationDelay = (Math.random() * 0.6).toFixed(2) + "s";
          p.style.transform = "rotate(" + Math.round(Math.random() * 180) + "deg)";
          layer.appendChild(p);
        }
      }
      /* Sound is intentionally OFF by default (Section 6.7). */
    })();
  </script>
</body>
</html>
