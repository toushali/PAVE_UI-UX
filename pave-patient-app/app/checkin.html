<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily check-in · PAVE</title>
  <meta name="theme-color" content="#FBFAF6">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<!-- Focused task flow: no bottom tab bar, back arrow returns to Today. -->
<body>
  <div class="app">

    <!-- ==================== Top bar ==================== -->
    <header class="topbar">
      <a class="iconbtn" href="today.html" aria-label="Back to Today">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5 8 12l7 7"/></svg>
      </a>
      <span class="topbar__title">Daily check-in</span>
    </header>

    <!-- ==================== Content: the form ==================== -->
    <main class="content" data-checkin-form id="formView">

      <h1 class="t-h1 rise rise-1">How are you today?</h1>

      <!-- 1) Pain scale 0..10 -->
      <section class="card rise rise-1" aria-label="Pain level">
        <span class="field-label">Your pain today</span>
        <div class="painscale" data-painscale role="radiogroup" aria-label="Pain from 0 to 10">
          <div class="painscale__value">
            <span class="painscale__num" data-pain-num>–</span>
            <span class="painscale__word" data-pain-word>Tap a number below</span>
          </div>
          <div class="painscale__segments">
            <button type="button" class="pain" data-pain="0"  role="radio" aria-checked="false" style="background:#4FA88B">0</button>
            <button type="button" class="pain" data-pain="1"  role="radio" aria-checked="false" style="background:#6CA87B">1</button>
            <button type="button" class="pain" data-pain="2"  role="radio" aria-checked="false" style="background:#89A86B">2</button>
            <button type="button" class="pain" data-pain="3"  role="radio" aria-checked="false" style="background:#A6A95B">3</button>
            <button type="button" class="pain" data-pain="4"  role="radio" aria-checked="false" style="background:#C3A94B">4</button>
            <button type="button" class="pain" data-pain="5"  role="radio" aria-checked="false" style="background:#E0A93B">5</button>
            <button type="button" class="pain" data-pain="6"  role="radio" aria-checked="false" style="background:#DA993E">6</button>
            <button type="button" class="pain" data-pain="7"  role="radio" aria-checked="false" style="background:#D38941">7</button>
            <button type="button" class="pain" data-pain="8"  role="radio" aria-checked="false" style="background:#CD7A44">8</button>
            <button type="button" class="pain" data-pain="9"  role="radio" aria-checked="false" style="background:#C66A47">9</button>
            <button type="button" class="pain" data-pain="10" role="radio" aria-checked="false" style="background:#C05A4A">10</button>
          </div>
        </div>
      </section>

      <!-- 2) Exercises completed today -->
      <section class="rise rise-2" aria-label="Exercises completed today">
        <span class="field-label">Exercises you did today</span>
        <div style="display:flex; flex-direction:column; gap:var(--sp-3);">
          <button type="button" class="checkrow is-done" data-check-row aria-pressed="true">
            <span class="checkrow__box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5 9.5 17.5 19.5 6.5"/></svg></span>
            <span class="checkrow__body">
              <span class="checkrow__label">Pelvic tilt</span>
              <span class="checkrow__meta">Pilates · 2× today</span>
            </span>
          </button>
          <button type="button" class="checkrow" data-check-row aria-pressed="false">
            <span class="checkrow__box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5 9.5 17.5 19.5 6.5"/></svg></span>
            <span class="checkrow__body">
              <span class="checkrow__label">Cat–cow stretch</span>
              <span class="checkrow__meta">Mobility · 1× today</span>
            </span>
          </button>
          <button type="button" class="checkrow" data-check-row aria-pressed="false">
            <span class="checkrow__box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5 9.5 17.5 19.5 6.5"/></svg></span>
            <span class="checkrow__body">
              <span class="checkrow__label">Glute bridge</span>
              <span class="checkrow__meta">Strengthening · 2× today</span>
            </span>
          </button>
          <button type="button" class="checkrow" data-check-row aria-pressed="false">
            <span class="checkrow__box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5 9.5 17.5 19.5 6.5"/></svg></span>
            <span class="checkrow__body">
              <span class="checkrow__label">Box breathing</span>
              <span class="checkrow__meta">Breathing · 1× today</span>
            </span>
          </button>
        </div>
      </section>

      <!-- 3) Compared to yesterday -->
      <section class="rise rise-3" aria-label="Compared to yesterday">
        <span class="field-label">Compared to yesterday</span>
        <div class="pillgroup" data-pillgroup role="radiogroup" aria-label="Compared to yesterday">
          <button type="button" class="pill" data-pill role="radio" aria-checked="false">Better</button>
          <button type="button" class="pill" data-pill role="radio" aria-checked="false">Same</button>
          <button type="button" class="pill" data-pill role="radio" aria-checked="false">Worse</button>
        </div>
      </section>

      <!-- 4) Optional doctor note (collapsed) -->
      <section class="rise rise-4" aria-label="Note for your doctor">
        <button type="button" class="btn btn--ghost" data-toggle="noteBox" aria-expanded="false" aria-controls="noteBox" style="justify-content:space-between;">
          <span>Add a note for your doctor <span class="field-optional">(optional)</span></span>
          <span aria-hidden="true">＋</span>
        </button>
        <div class="collapse" id="noteBox">
          <label class="notefield">
            <textarea data-note-text placeholder="Anything you want Dr. Stillman to know? This is optional."></textarea>
          </label>
          <button type="button" class="micbtn" data-mic aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5.5 11a6.5 6.5 0 0 0 13 0"/><path d="M12 17.5V21"/><path d="M8.5 21h7"/></svg>
            <span data-mic-label>Tap to speak</span>
          </button>
        </div>
      </section>

      <!-- 5) Sticky submit. Nothing is required — forgiving by design. -->
      <a class="btn btn--primary btn--sticky rise rise-4" href="confirmation.html">Submit today's check-in</a>

      <!-- Prototype helper: preview the already-submitted state -->
      <p class="t-center">
        <button type="button" class="btn btn--ghost" id="demoDone" style="max-width:300px; margin:0 auto; min-height:var(--tap-min);">Preview “already checked in” state</button>
      </p>

    </main>

    <!-- ==================== Already-submitted state ==================== -->
    <!-- Friendly done panel shown instead of the form when the patient
         has already checked in today (Section 6.6). Not an error. -->
    <main class="content" id="doneView" hidden>
      <div class="card donepanel rise rise-1">
        <span class="donepanel__badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5 9.5 17.5 19.5 6.5"/></svg>
        </span>
        <h1 class="t-h1">You've checked in today ✓</h1>
        <p class="t-body-lg t-muted">Nice work, John. Come back tomorrow — your next reminder is at 9:00 AM.</p>
        <a class="btn btn--primary" href="today.html">Back to Today</a>
        <button type="button" class="btn btn--ghost" id="demoForm" style="min-height:var(--tap-min);">Preview the check-in form</button>
      </div>
    </main>

  </div>

  <script src="../js/app.js"></script>
  <script>
    /* Prototype-only: swap between the form and the already-submitted
       done panel so both states (Section 6.6) are demonstrable. */
    (function () {
      var formView = document.getElementById("formView");
      var doneView = document.getElementById("doneView");
      document.getElementById("demoDone").addEventListener("click", function () {
        formView.hidden = true;
        doneView.hidden = false;
        window.scrollTo(0, 0);
      });
      document.getElementById("demoForm").addEventListener("click", function () {
        doneView.hidden = true;
        formView.hidden = false;
        window.scrollTo(0, 0);
      });
    })();
  </script>
</body>
</html>
